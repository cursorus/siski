<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Album</title>
<style>
  :root{
    --bg:#0b0c0f;
    --panel:#15171c;
    --ink:#eef0f3;
    --muted:#8b919c;
    --accent:#7c9eff;
    --gap:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    font-family:-apple-system,"SF Pro Text",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-tap-highlight-color:transparent;
    touch-action:pan-y;
  }

  header{
    position:sticky;
    top:0;
    z-index:10;
    background:linear-gradient(to bottom, rgba(11,12,15,.95), rgba(11,12,15,.85) 70%, transparent);
    padding:14px 16px 10px;
  }
  .back{
    color:var(--accent);
    text-decoration:none;
    font-size:14px;
    display:inline-flex;
    align-items:center;
    gap:4px;
    margin-bottom:8px;
  }
  h1{
    font-family:Georgia,'Times New Roman',serif;
    font-weight:700;
    font-size:22px;
    line-height:1.2;
  }
  .sub{
    font-size:12.5px;
    color:var(--muted);
    margin-top:2px;
  }

  /* Переключатель режимов */
  .mode-switch{
    display:flex;
    gap:4px;
    background:var(--panel);
    border-radius:999px;
    padding:4px;
    margin-top:12px;
    width:fit-content;
  }
  .mode-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:38px;height:30px;
    border-radius:999px;
    cursor:pointer;
    color:var(--muted);
  }
  .mode-btn.active{
    background:#2a2d36;
    color:var(--ink);
  }
  .mode-btn svg{width:17px;height:17px;}

  /* Дата-заголовки */
  .date-heading{
    font-size:14px;
    font-weight:600;
    padding:14px 16px 8px;
    color:var(--ink);
  }

  /* Grid режимы */
  .grid{
    display:grid;
    gap:var(--gap);
    padding:0 var(--gap);
  }
  .cell{
    position:relative;
    overflow:hidden;
    background:#1a1c22;
  }
  .cell img, .cell video{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .cell .play-badge{
    position:absolute;
    bottom:6px; right:6px;
    background:rgba(0,0,0,.45);
    border-radius:50%;
    width:22px;height:22px;
    display:flex;align-items:center;justify-content:center;
  }
  .cell .play-badge svg{width:11px;height:11px;fill:#fff;}

  /* Default: квадраты, без скруглений */
  .grid.mode-default .cell{ aspect-ratio:1/1; border-radius:0; }

  /* Rounded: квадраты со скруглением и небольшим зазором */
  .grid.mode-rounded{ gap:8px; padding:0 8px; }
  .grid.mode-rounded .cell{ aspect-ratio:1/1; border-radius:14px; }

  /* Smart: динамические соотношения сторон по реальным размерам медиа */
  .grid.mode-smart{ gap:6px; padding:0 6px; }
  .grid.mode-smart .cell{ border-radius:10px; }

  .skeleton{
    background:linear-gradient(100deg,#171920 30%,#1f222a 50%,#171920 70%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
  }

  .empty-state{
    padding:60px 24px;
    text-align:center;
    color:var(--muted);
  }

  /* Лайтбокс */
  .lightbox{
    position:fixed; inset:0;
    background:#000;
    z-index:50;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .lightbox.open{ display:flex; }
  .lightbox img, .lightbox video{
    max-width:100%; max-height:100%;
    object-fit:contain;
  }
  .lightbox .close{
    position:absolute;
    top:16px; right:16px;
    width:36px;height:36px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
    z-index:51;
  }

  .zoom-hint{
    position:fixed;
    bottom:16px; left:50%;
    transform:translateX(-50%);
    background:rgba(20,22,28,.9);
    border:1px solid #2a2d36;
    color:var(--muted);
    font-size:12px;
    padding:7px 14px;
    border-radius:999px;
    opacity:0;
    transition:opacity .25s ease;
    pointer-events:none;
    z-index:20;
  }
  .zoom-hint.show{ opacity:1; }
</style>
</head>
<body>

<header>
  <a class="back" href="/">‹ Library</a>
  <h1 id="albumTitle">Album</h1>
  <div class="sub" id="albumSub"></div>
  <div class="mode-switch">
    <div class="mode-btn" data-mode="rounded" title="Rounded">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2.5" fill="currentColor"/><rect x="13" y="3" width="8" height="8" rx="2.5" fill="currentColor"/><rect x="3" y="13" width="8" height="8" rx="2.5" fill="currentColor"/><rect x="13" y="13" width="8" height="8" rx="2.5" fill="currentColor"/></svg>
    </div>
    <div class="mode-btn" data-mode="default" title="Default">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" fill="currentColor"/><rect x="13" y="3" width="8" height="8" fill="currentColor"/><rect x="3" y="13" width="8" height="8" fill="currentColor"/><rect x="13" y="13" width="8" height="8" fill="currentColor"/></svg>
    </div>
    <div class="mode-btn" data-mode="smart" title="Smart">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="13" height="8" rx="2" fill="currentColor"/><rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor"/><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor"/></svg>
    </div>
  </div>
</header>

<div id="content">
  <div class="grid mode-default" id="grid"></div>
</div>

<div class="zoom-hint" id="zoomHint">3 в ряд</div>

<div class="lightbox" id="lightbox">
  <div class="close" onclick="closeLightbox()">✕</div>
  <div id="lightboxContent"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const accIndex = parseInt(params.get("acc") || "0", 10);
  const albumId = params.get("albumId");
  const albumTitle = params.get("title") || "Album";

  const accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
  const account = accounts[accIndex];

  document.getElementById("albumTitle").textContent = albumTitle;

  // ---- Режим отображения ----
  let mode = localStorage.getItem("viewMode") || "default";
  const grid = document.getElementById("grid");

  function applyModeUI(){
    document.querySelectorAll(".mode-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.mode === mode);
    });
    grid.className = "grid mode-" + mode;
  }
  document.querySelectorAll(".mode-btn").forEach(btn => {
    btn.onclick = () => {
      mode = btn.dataset.mode;
      localStorage.setItem("viewMode", mode);
      applyModeUI();
      renderItems();
    };
  });
  applyModeUI();

  // ---- Колонки + pinch zoom ----
  let cols = parseInt(localStorage.getItem("gridCols") || "3", 10);
  const MIN_COLS = 2, MAX_COLS = 6;

  function setCols(n, showHint){
    cols = Math.min(MAX_COLS, Math.max(MIN_COLS, n));
    localStorage.setItem("gridCols", String(cols));
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    if (showHint) showZoomHint();
  }

  const zoomHint = document.getElementById("zoomHint");
  let hintTimeout;
  function showZoomHint(){
    zoomHint.textContent = cols + " в ряд";
    zoomHint.classList.add("show");
    clearTimeout(hintTimeout);
    hintTimeout = setTimeout(() => zoomHint.classList.remove("show"), 900);
  }

  // pinch gesture
  let pinchStartDist = null;
  let pinchStartCols = cols;

  document.addEventListener("touchstart", e => {
    if (e.touches.length === 2){
      pinchStartDist = dist(e.touches[0], e.touches[1]);
      pinchStartCols = cols;
    }
  }, {passive:true});

  document.addEventListener("touchmove", e => {
    if (e.touches.length === 2 && pinchStartDist){
      const d = dist(e.touches[0], e.touches[1]);
      const ratio = d / pinchStartDist;
      // pinch out (ratio>1) -> fewer columns (bigger photos)
      // pinch in (ratio<1) -> more columns (smaller photos)
      let delta = 0;
      if (ratio > 1.18) delta = -1;
      else if (ratio < 0.84) delta = 1;
      if (delta !== 0){
        const newCols = pinchStartCols + delta;
        if (newCols !== cols){
          setCols(newCols, true);
        }
        pinchStartDist = d;
        pinchStartCols = cols;
      }
    }
  }, {passive:true});

  document.addEventListener("touchend", e => {
    if (e.touches.length < 2) pinchStartDist = null;
  });

  function dist(t1, t2){
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }

  setCols(cols, false);

  // ---- Загрузка медиа ----
  function skeletonGrid(){
    let out = "";
    for (let i=0;i<18;i++){
      out += `<div class="cell skeleton" style="aspect-ratio:1/1"></div>`;
    }
    return out;
  }

  let mediaItems = [];

  async function loadMedia(){
    if (!account){
      document.getElementById("content").innerHTML = `<div class="empty-state">Аккаунт не найден</div>`;
      return;
    }
    grid.innerHTML = skeletonGrid();

    try{
      const res = await fetch(`/api/media?token=${account.access_token}&album=${albumId}`);
      const data = await res.json();
      mediaItems = data.mediaItems || [];

      document.getElementById("albumSub").textContent = mediaItems.length
        ? `${mediaItems.length} объектов`
        : "пусто";

      if (!mediaItems.length){
        document.getElementById("content").innerHTML = `<div class="empty-state">В альбоме пока ничего нет</div>`;
        return;
      }

      renderItems();
    } catch(e){
      document.getElementById("content").innerHTML = `<div class="empty-state">Не удалось загрузить медиа</div>`;
    }
  }

  function renderItems(){
    grid.className = "grid mode-" + mode;
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    grid.innerHTML = mediaItems.map((item, i) => {
      const isVideo = !!(item.mediaMetadata && item.mediaMetadata.video);
      const w = item.mediaMetadata && item.mediaMetadata.width;
      const h = item.mediaMetadata && item.mediaMetadata.height;
      const thumb = `${item.baseUrl}=w400-h400-c`;

      let style = "";
      if (mode === "smart" && w && h){
        // span wide items across 2 columns if they're notably landscape
        const ratio = parseInt(w,10) / parseInt(h,10);
        if (ratio > 1.4 && cols > 2){
          style = `style="grid-column: span 2; aspect-ratio:${ratio}"`;
        } else {
          style = `style="aspect-ratio:${ratio}"`;
        }
      }

      return `
        <div class="cell" ${style} onclick="openLightbox(${i})">
          <img src="${thumb}" loading="lazy" />
          ${isVideo ? `<div class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>` : ""}
        </div>
      `;
    }).join("");
  }

  // ---- Лайтбокс ----
  const lightbox = document.getElementById("lightbox");
  const lightboxContent = document.getElementById("lightboxContent");

  function openLightbox(i){
    const item = mediaItems[i];
    const isVideo = !!(item.mediaMetadata && item.mediaMetadata.video);
    if (isVideo){
      lightboxContent.innerHTML = `<video src="${item.baseUrl}=dv" controls autoplay></video>`;
    } else {
      lightboxContent.innerHTML = `<img src="${item.baseUrl}=w1600-h1600" />`;
    }
    lightbox.classList.add("open");
  }
  function closeLightbox(){
    lightbox.classList.remove("open");
    lightboxContent.innerHTML = "";
  }
  lightbox.addEventListener("click", e => {
    if (e.target === lightbox) closeLightbox();
  });

  loadMedia();
</script>
</body>
</html>
